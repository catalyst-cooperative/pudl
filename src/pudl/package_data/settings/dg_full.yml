execution:
  config:
    multiprocess:
      max_concurrent: 0
      tag_concurrency_limits:
        - key: memory-use
          value: high
          limit: 4
loggers:
  console:
    config:
      log_level: INFO
resources:
  datastore:
    config:
      cloud_cache_path: s3://pudl.catalyst.coop/zenodo
      use_local_cache: true
  etl_settings:
    config:
      etl_settings_path: src/pudl/package_data/settings/etl_full.yml
  runtime_settings:
    config:
      xbrl_num_workers: null
      xbrl_batch_size: 50
      xbrl_loglevel: INFO
