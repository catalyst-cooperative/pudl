# Dagster launch config for pytest integration test prebuilds.
#
# Uses the in-process executor so that pytest's coverage collection can instrument
# all ETL code in the same process. Multi-process execution would require a separate
# coverage setup (e.g. coverage subprocess plugins). See GitHub issue #5119 for the
# follow-up work to enable coverage with the multiprocess executor.
execution:
  config:
    in_process: {}
loggers:
  console:
    config:
      log_level: INFO
resources:
  datastore:
    config:
      cloud_cache_path: s3://pudl.catalyst.coop/zenodo
      use_local_cache: true
  global_data_config:
    config:
      global_data_config_path: src/pudl/package_data/settings/etl_fast.yml
  runtime_settings:
    config:
      xbrl_num_workers: null
      xbrl_batch_size: 50
      xbrl_loglevel: INFO
