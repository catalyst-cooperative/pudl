version: 2
sources:
  - name: pudl
    tables:
      - name: out_rus7__yearly_distribution_services
        data_tests:
          - expect_columns_not_all_null
          - check_row_counts_per_partition:
              arguments:
                table_name: out_rus7__yearly_distribution_services
                partition_expr: "EXTRACT(YEAR FROM report_date)"
        # TODO: VALIDATE STATUSES SUM TO TOTAL
        # No subcomponents_sum_to_total test: per RUS Form 7 Part B (both
        # pre-2014 and 2014 revisions), "total" (Total Services in Place) is a
        # cumulative stock while "connected" (New Services Connected) and
        # "retired" (Services Retired) are annual flows; the form defines no
        # sum relationship between these lines (contrast Total Miles Energized
        # = 5 + 6 + 7). 100% of records (8483/8483) fail a naive sum-to-total
        # check, and "idle" is a subset of total (idle <= total always), not a
        # summand. The underlying identity is year-over-year:
        # total(y) = total(y-1) + connected(y) - retired(y), which holds
        # exactly (+/-1) for 54% of year-pairs (4281/7861) but cannot be
        # expressed with the subcomponents_sum_to_total macro.
        columns:
          - name: borrower_name_rus
          - name: state
          - name: report_date
          - name: borrower_id_rus
          - name: service_status
          - name: services
            data_tests:
              - dbt_expectations.expect_column_min_to_be_between:
                  arguments:
                    min_value: 0.0
                  config:
                    error_if: ">3"
          - name: is_total
