version: 2
sources:
  - name: pudl
    tables:
      - name: core_rus7__yearly_energy_efficiency
        data_tests:
          - expect_columns_not_all_null
          - subcomponents_sum_to_total:
              arguments:
                group_by_columns:
                  [borrower_id_rus, report_date, observation_period]
                categorical_column: customer_class
                value_column: customers_num
                subcomponents_list:
                  [
                    "residential_excluding_seasonal",
                    "commercial_and_industrial_large",
                    "commercial_and_industrial_small",
                    "irrigation",
                    "public_other",
                    "public_street_lighting",
                    "residential_seasonal",
                    "sales_for_resale_other",
                    "sales_for_resale_rus_borrowers",
                  ]
                total_label: "total"
                tolerance: 0
          - subcomponents_sum_to_total:
              arguments:
                group_by_columns:
                  [borrower_id_rus, report_date, observation_period]
                categorical_column: customer_class
                value_column: invested
                subcomponents_list:
                  [
                    "residential_excluding_seasonal",
                    "commercial_and_industrial_large",
                    "commercial_and_industrial_small",
                    "irrigation",
                    "public_other",
                    "public_street_lighting",
                    "residential_seasonal",
                    "sales_for_resale_other",
                    "sales_for_resale_rus_borrowers",
                  ]
                total_label: "total"
                tolerance: 1
              config:
                error_if: ">6"
          - subcomponents_sum_to_total:
              arguments:
                group_by_columns:
                  [borrower_id_rus, report_date, observation_period]
                categorical_column: customer_class
                value_column: savings_mmbtu
                subcomponents_list:
                  [
                    "residential_excluding_seasonal",
                    "commercial_and_industrial_large",
                    "commercial_and_industrial_small",
                    "irrigation",
                    "public_other",
                    "public_street_lighting",
                    "residential_seasonal",
                    "sales_for_resale_other",
                    "sales_for_resale_rus_borrowers",
                  ]
                total_label: "total"
                tolerance: 1
              config:
                error_if: ">11"
        columns:
          - name: report_date
          - name: borrower_id_rus
          - name: borrower_name_rus
          - name: customer_class
          - name: observation_period
          - name: customers_num
            data_tests:
              - dbt_expectations.expect_column_min_to_be_between:
                  arguments:
                    min_value: 0.0
                  row_condition: "observation_period == 'cumulative'"
          - name: invested
            data_tests:
              - dbt_expectations.expect_column_min_to_be_between:
                  arguments:
                    min_value: 0.0
          - name: savings_mmbtu
            data_tests:
              - dbt_expectations.expect_column_min_to_be_between:
                  arguments:
                    min_value: 0.0
                  config:
                    error_if: ">8"
                  description: "KS0059 has negative values which don't follow from prior years of data." #TODO
                  # TODO: Also note that this column likely has unit issues in it. See
                  # https://github.com/catalyst-cooperative/pudl/issues/4887
