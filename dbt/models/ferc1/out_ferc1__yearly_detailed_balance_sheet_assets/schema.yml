version: 2
sources:
  - name: pudl
    tables:
      - name: out_ferc1__yearly_detailed_balance_sheet_assets
        data_tests:
          - expect_columns_not_all_null
          - check_row_counts_per_partition:
              arguments:
                table_name: out_ferc1__yearly_detailed_balance_sheet_assets
                partition_expr: report_year
        columns:
          - name: report_year
          - name: utility_id_ferc1
          - name: utility_id_ferc1_dbf
          - name: utility_id_ferc1_xbrl
          - name: utility_id_pudl
          - name: utility_name_ferc1
          - name: xbrl_factoid
          - name: utility_type
          - name: plant_function
          - name: plant_status
          - name: ending_balance
          - name: utility_type_other
          - name: in_rate_base
            data_tests:
              - dbt_expectations.expect_column_values_to_be_in_set:
                  description: All of the many production and storage factoids should be labeled as in rate base
                  arguments:
                    value_set:
                      - true
                    row_condition: "'production_plant' in xbrl_factoid or 'energy_storage' in xbrl_factoid"
          - name: rate_base_category
          - name: table_name
