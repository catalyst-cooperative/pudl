version: 2
sources:
  - name: pudl
    tables:
      - name: out_rus12__yearly_balance_sheet_assets
        data_tests:
          - check_row_counts_per_partition:
              arguments:
                table_name: out_rus12__yearly_balance_sheet_assets
                partition_expr: "EXTRACT(YEAR FROM report_date)"
        columns:
          - name: borrower_name_rus
          - name: state
          - name: report_date
          - name: borrower_id_rus
          - name: asset_type
          - name: ending_balance
          - name: is_total
