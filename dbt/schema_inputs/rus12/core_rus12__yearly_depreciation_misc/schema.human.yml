sources:
- tables:
  - data_tests:
    - expect_columns_not_all_null
    - check_row_counts_per_partition:
        arguments:
          table_name: core_rus12__yearly_depreciation_misc
          partition_expr: EXTRACT(YEAR FROM report_date)
    columns:
    - data_tests:
      - dbt_expectations.expect_column_values_to_be_between:
          arguments:
            min_value: 0.0
          config:
            error_if: '>126'
          description: Check that most of the ending_balance's are positive. About
            4% of the table is negative, which seems reasonable.
