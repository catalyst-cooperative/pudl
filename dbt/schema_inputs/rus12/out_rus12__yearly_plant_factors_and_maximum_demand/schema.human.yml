sources:
- tables:
  - data_tests:
    - check_row_counts_per_partition:
        arguments:
          table_name: out_rus12__yearly_plant_factors_and_maximum_demand
          partition_expr: EXTRACT(YEAR FROM report_date)
    columns:
    - data_tests:
      - dbt_expectations.expect_column_values_to_be_between:
          arguments:
            min_value: 0.0
            max_value: 1.0
          config:
            error_if: '>13'
    - data_tests:
      - dbt_expectations.expect_column_values_to_be_between:
          arguments:
            min_value: 0.0
            max_value: 1.0
          config:
            error_if: '>121'
    - data_tests:
      - dbt_expectations.expect_column_values_to_be_between:
          arguments:
            min_value: 0.0
            max_value: 1.0
          config:
            error_if: '>2'
    - data_tests:
      - dbt_expectations.expect_column_values_to_be_between:
          arguments:
            min_value: 0.0
    - data_tests:
      - dbt_expectations.expect_column_values_to_be_between:
          arguments:
            min_value: 0.0
