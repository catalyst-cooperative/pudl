sources:
- tables:
  - data_tests:
    - expect_columns_not_all_null
    - check_row_counts_per_partition:
        arguments:
          table_name: out_rus12__yearly_plant_operations_by_plant
          partition_expr: EXTRACT(YEAR FROM report_date)
    - dbt_utils.expression_is_true:
        arguments:
          expression: (operating_hours_in_service + operating_hours_on_standby + operating_hours_out_of_service_scheduled
            + operating_hours_out_of_service_unscheduled) <= 8785
        description: Plants shouldn't report more hours across all fields than there
          are in a calendar year (8784 is a leap year, and we allow for rounding).
    columns:
    - data_tests:
      - dbt_expectations.expect_column_min_to_be_between:
          arguments:
            min_value: 0.0
    - data_tests:
      - dbt_expectations.expect_column_min_to_be_between:
          arguments:
            min_value: 0.0
    - data_tests:
      - dbt_expectations.expect_column_min_to_be_between:
          arguments:
            min_value: 0.0
      - dbt_expectations.expect_column_max_to_be_between:
          arguments:
            min_value: 100.0
    - data_tests:
      - dbt_expectations.expect_column_min_to_be_between:
          arguments:
            min_value: 0.0
      - dbt_expectations.expect_column_max_to_be_between:
          arguments:
            max_value: 0.0
            row_condition: plant_type IN ('hydro', 'nuclear')
    - data_tests:
      - dbt_expectations.expect_column_min_to_be_between:
          arguments:
            min_value: 0.0
      - dbt_expectations.expect_column_max_to_be_between:
          arguments:
            max_value: 0.0
            row_condition: plant_type IN ('hydro', 'nuclear')
    - data_tests:
      - dbt_expectations.expect_column_min_to_be_between:
          arguments:
            min_value: 0.0
      - dbt_expectations.expect_column_max_to_be_between:
          arguments:
            max_value: 0.0
            row_condition: plant_type IN ('hydro', 'nuclear')
    - data_tests:
      - dbt_expectations.expect_column_min_to_be_between:
          arguments:
            min_value: 0.0
      - dbt_expectations.expect_column_max_to_be_between:
          arguments:
            max_value: 0.0
            row_condition: plant_type IN ('hydro', 'nuclear')
    - data_tests:
      - dbt_expectations.expect_column_min_to_be_between:
          arguments:
            min_value: 0.0
    - data_tests:
      - dbt_expectations.expect_column_min_to_be_between:
          arguments:
            min_value: 0.0
    - data_tests:
      - dbt_expectations.expect_column_min_to_be_between:
          arguments:
            min_value: 0.0
    - data_tests:
      - dbt_expectations.expect_column_min_to_be_between:
          arguments:
            min_value: 0.0
    - data_tests:
      - dbt_expectations.expect_column_min_to_be_between:
          arguments:
            min_value: 0.0
