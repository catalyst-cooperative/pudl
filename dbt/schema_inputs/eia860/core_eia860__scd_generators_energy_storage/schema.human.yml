sources:
- tables:
  - data_tests:
    - expect_columns_not_all_null:
        description: 'Excluded columns have yet to be used in any year, but as more
          energy storage technologies become available, we might want to stop excluding
          them.

          '
        arguments:
          exclude_columns:
          - storage_technology_code_3
          - storage_technology_code_4
    - check_row_counts_per_partition:
        arguments:
          table_name: core_eia860__scd_generators_energy_storage
          partition_expr: EXTRACT(YEAR FROM report_date)
