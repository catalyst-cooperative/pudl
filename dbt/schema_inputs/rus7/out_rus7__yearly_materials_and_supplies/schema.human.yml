sources:
- tables:
  - data_tests:
    - expect_columns_not_all_null
    - check_row_counts_per_partition:
        arguments:
          table_name: out_rus7__yearly_materials_and_supplies
          partition_expr: EXTRACT(YEAR FROM report_date)
    - dbt_utils.expression_is_true:
        arguments:
          expression: materials_purchased + materials_salvaged - materials_sold -
            materials_used + materials_adjustment <= materials_ending_balance
        description: Check that annual changes don't exceed ending balance.
        config:
          error_if: '>3'
    columns:
    - data_tests:
      - dbt_expectations.expect_column_values_to_be_between:
          arguments:
            min_value: 0.0
          config:
            error_if: '>12'
    - data_tests:
      - dbt_expectations.expect_column_values_to_be_between:
          arguments:
            min_value: 0.0
          config:
            error_if: '>2'
    - data_tests:
      - dbt_expectations.expect_column_values_to_be_between:
          arguments:
            min_value: 0.0
          config:
            error_if: '>16'
    - data_tests:
      - dbt_expectations.expect_column_values_to_be_between:
          arguments:
            min_value: 0.0
          config:
            error_if: '>7'
    - data_tests:
      - dbt_expectations.expect_column_values_to_be_between:
          arguments:
            min_value: 0.0
          config:
            error_if: '>4'
