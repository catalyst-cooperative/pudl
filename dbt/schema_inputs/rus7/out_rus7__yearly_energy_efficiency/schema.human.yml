sources:
- tables:
  - data_tests:
    - expect_columns_not_all_null
    - check_row_counts_per_partition:
        arguments:
          table_name: out_rus7__yearly_energy_efficiency
          partition_expr: EXTRACT(YEAR FROM report_date)
    - subcomponents_sum_to_total:
        arguments:
          group_by_columns:
          - borrower_id_rus
          - report_date
          - observation_period
          categorical_column: customer_class
          value_column: customers_num
          total_label: total
          tolerance: 0
    - subcomponents_sum_to_total:
        arguments:
          group_by_columns:
          - borrower_id_rus
          - report_date
          - observation_period
          categorical_column: customer_class
          value_column: invested
          total_label: total
          tolerance: 1
        config:
          error_if: '>6'
    - subcomponents_sum_to_total:
        arguments:
          group_by_columns:
          - borrower_id_rus
          - report_date
          - observation_period
          categorical_column: customer_class
          value_column: savings_mmbtu
          total_label: total
          tolerance: 1
        config:
          error_if: '>11'
    columns:
    - data_tests:
      - dbt_expectations.expect_column_min_to_be_between:
          arguments:
            min_value: 0.0
          row_condition: observation_period == 'cumulative'
    - data_tests:
      - dbt_expectations.expect_column_min_to_be_between:
          arguments:
            min_value: 0.0
    - data_tests:
      - dbt_expectations.expect_column_min_to_be_between:
          arguments:
            min_value: 0.0
          config:
            error_if: '>8'
          description: KS0059 has negative values which don't follow from prior years
            of data.
