sources:
  - name: pudl
    tables:
      - name: out_rus7__yearly_patronage_capital
        data_tests:
          - expect_columns_not_all_null
          - dbt_expectations.expect_column_pair_values_A_to_be_greater_than_B:
              arguments:
                column_A: patronage_cumulative
                column_B: patronage_report_year
                or_equal: true
              config:
                error_if: ">14"
              description:
                Some 0 cumulative values and a handful of other values causing
                failure. Investigate.
          - check_row_counts_per_partition:
              arguments:
                table_name: out_rus7__yearly_patronage_capital
                partition_expr: EXTRACT(YEAR FROM report_date)
          - subcomponents_sum_to_total:
              arguments:
                group_by_columns:
                  - borrower_id_rus
                  - report_date
                categorical_column: patronage_type
                value_column: patronage_cumulative
                subcomponents_list:
                  - distributions_general_retirements
                  - distributions_special_retirements
                total_label: total_distributions_retirements
                tolerance: 1
              config:
                error_if: ">435"
          - subcomponents_sum_to_total:
              arguments:
                group_by_columns:
                  - borrower_id_rus
                  - report_date
                categorical_column: patronage_type
                value_column: patronage_report_year
                subcomponents_list:
                  - distributions_general_retirements
                  - distributions_special_retirements
                total_label: total_distributions_retirements
                tolerance: 1
              config:
                error_if: ">1"
          - subcomponents_sum_to_total:
              arguments:
                group_by_columns:
                  - borrower_id_rus
                  - report_date
                categorical_column: patronage_type
                value_column: patronage_cumulative
                subcomponents_list:
                  - received_lenders_of_electric_power
                  - received_supplier_of_electric_power
                total_label: total_received
                tolerance: 1
          - subcomponents_sum_to_total:
              arguments:
                group_by_columns:
                  - borrower_id_rus
                  - report_date
                categorical_column: patronage_type
                value_column: patronage_report_year
                subcomponents_list:
                  - received_lenders_of_electric_power
                  - received_supplier_of_electric_power
                total_label: total_received
                tolerance: 1
        columns:
          - name: patronage_report_year
            data_tests:
              - dbt_expectations.expect_column_min_to_be_between:
                  arguments:
                    min_value: 0.0
                  config:
                    error_if: ">2"
                  description: FL0026 and OH0071 each report one negative value. Investigate.
          - name: patronage_cumulative
            data_tests:
              - dbt_expectations.expect_column_min_to_be_between:
                  arguments:
                    min_value: 0.0
