sources:
  - name: pudl
    tables:
      - name: out_eia923__generation_fuel_combined
        data_tests:
          - expect_columns_not_all_null
          - check_row_counts_per_partition:
              arguments:
                table_name: out_eia923__generation_fuel_combined
                partition_expr: EXTRACT(YEAR FROM report_date)
        columns:
          - name: fuel_mmbtu_per_unit
            data_tests:
              - expect_quantile_constraints:
                  description:
                    The Generation Fuel table does not break different coal types
                    out separately, so we can only test the validity of the entire suite of
                    coal records.
                  arguments:
                    row_condition: fuel_type_code_pudl='coal'
                    constraints:
                      - quantile: 0.5
                        min_value: 10.0
                        max_value: 30.0
                    weight_column: fuel_consumed_units
              - expect_quantile_constraints:
                  description:
                    Quantile 0.05 dropped from 5.5 to 5.49 April 2025; keep an
                    eye on it.
                  arguments:
                    row_condition: fuel_type_code_agg='DFO'
                    constraints:
                      - quantile: 0.05
                        min_value: 5.4
                      - quantile: 0.95
                        max_value: 6.0
                      - quantile: 0.5
                        min_value: 5.75
                        max_value: 5.85
                    weight_column: fuel_consumed_units
              - expect_quantile_constraints:
                  description:
                    Quantile 0.05 dropped from 5.0 to 4.79 April 2025; keep an
                    eye on it.
                  arguments:
                    row_condition: fuel_type_code_pudl='oil'
                    constraints:
                      - quantile: 0.05
                        min_value: 4.7
                      - quantile: 0.95
                        max_value: 6.6
                    weight_column: fuel_consumed_units
