sources:
  - name: pudl
    tables:
      - name: core_eia861__yearly_net_metering_customer_fuel_class
        data_tests:
          - expect_columns_not_all_null:
              arguments:
                row_conditions:
                  capacity_mw: EXTRACT(year FROM report_date) >= 2010
                  energy_capacity_mwh: EXTRACT(year FROM report_date) >= 2023
                  short_form: EXTRACT(year FROM report_date) = 2019
                  sold_to_utility_mwh: EXTRACT(year FROM report_date) >= 2007
          - check_row_counts_per_partition:
              arguments:
                table_name: core_eia861__yearly_net_metering_customer_fuel_class
                partition_expr: EXTRACT(YEAR FROM report_date)
        columns:
          - name: capacity_mw
            data_tests:
              - dbt_expectations.expect_column_min_to_be_between:
                  arguments:
                    min_value: 0.0
                    row_condition: utility_id_eia != 99999
          - name: energy_capacity_mwh
            data_tests:
              - dbt_expectations.expect_column_min_to_be_between:
                  arguments:
                    min_value: 0.0
          - name: customers
            data_tests:
              - dbt_expectations.expect_column_min_to_be_between:
                  arguments:
                    min_value: 0.0
          - name: sold_to_utility_mwh
            data_tests:
              - dbt_expectations.expect_column_min_to_be_between:
                  arguments:
                    min_value: 0.0
                    error_if: ">2"
