name: Update Zenodo DOIs

on:
  schedule:
    - cron: "17 8 3 * *" # 8:17 UTC on the 3rd day of the month.
  workflow_dispatch:
    inputs:
      datasets:
        description: "Specific datasets to update (space separated)"
        required: false
        default: "eia191,eia757a,eiaapi,epacamd_eia,epacems" # Default to all datasets that don't require any hand-mapping for now

permissions:
  contents: write
  pull-requests: write

jobs:
  update-dois:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pudl environment using pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          locked: true
          cache: true
          cache-write: ${{ github.event_name == 'push' && github.ref_name == 'main' }}

      - name: Run Zenodo DOI updater
        id: update
        run: |
          pixi run update_zenodo_dois \
            ${{ github.event.inputs.datasets && format('--datasets {0}', github.event.inputs.datasets) || '' }}

          # Check if any changes were made
          if git diff --quiet; then
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "No changes detected"
          else
            echo "changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected!"
          fi

      - name: Create branch and commit
        if: steps.update.outputs.changes == 'true'
        run: |
          git config user.name "zenodo-bot"
          git config user.email "bot@github.com"
          git checkout -b update-zenodo-dois-${{ github.run_number }}-${{ github.run_id }}
          git add src/pudl/package_data/settings/zenodo_dois.yml
          git commit -m "chore(zenodo): update DOIs to latest record versions

          Automated update via GitHub Actions.

          Run by: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Push changes
        if: steps.update.outputs.changes == 'true'
        run: |
          git push --set-upstream origin update-zenodo-dois-${{ github.run_number }}-${{ github.run_id }}

      - name: Create Pull Request
        if: steps.update.outputs.changes == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(zenodo): update DOIs to latest versions"
          title: "chore(zenodo): update DOIs to latest record versions"
          body: |
            Automated update of Zenodo DOIs to latest record versions.

            **Changes:**
            - Updated `zenodo_dois.yml` with latest record IDs
            - Run by [workflow ${{ github.run_id }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})

            ---

            🤖 *This PR was created automatically by GitHub Actions*
          branch: update-zenodo-dois-${{ github.run_number }}-${{ github.run_id }}
          base: main
          labels: automated, zenodo, dependencies
