---
name: release

on:
  push:
    tags:
      - "v20*"

jobs:
  create-github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout source
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Determine previous release tag
        run: |
          echo "PREVIOUS_RELEASE_TAG=$(git tag --list 'v20*' --sort=-v:refname | grep -v "$(git describe --tags --exact-match HEAD 2>/dev/null || echo 'none')" | head -n 1)" >> "${GITHUB_ENV}"
      - name: Create source tarball
        run: |
          mkdir -p dist
          git archive \
            --format=tar.gz \
            --prefix="pudl-${{ github.ref_name }}/" \
            --output="dist/pudl-${{ github.ref_name }}.tar.gz" \
            HEAD
      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          gh release create '${{ github.ref_name }}' \
            --title 'PUDL ${{ github.ref_name }}' \
            --generate-notes \
            --notes-start-tag "$PREVIOUS_RELEASE_TAG" \
            --notes "PUDL is an application that must be installed from the repository using pixi.

          ## Installation:
          \`\`\`bash
          git clone https://github.com/catalyst-cooperative/pudl.git
          cd pudl
          git checkout ${{ github.ref_name }}
          pixi install
          \`\`\`

          ## Data Release:
          Data products generated by this release will be published separately to Zenodo
          as well as s3://pudl.catalyst.coop/'${{ github.ref_name }}'.

          ## Changes:
          See [Release Notes](https://docs.catalyst.coop/pudl/en/latest/release_notes.html) for details." \
              --repo '${{ github.repository }}'
      - name: Attach source tarball to GitHub Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          gh release upload '${{ github.ref_name }}' \
            "dist/pudl-${{ github.ref_name }}.tar.gz" \
            --repo '${{ github.repository }}' \
            --clobber

  notify-zulip:
    runs-on: ubuntu-latest
    needs:
      - create-github-release
    steps:
      - name: Notify Zulip of release status
        uses: zulip/github-actions-zulip/send-message@v2
        continue-on-error: true
        with:
          api-key: ${{ secrets.ZULIP_API_KEY }}
          email: "build-status-bot@catalyst-cooperative.zulipchat.com"
          organization-url: "https://catalyst-cooperative.zulipchat.com"
          type: "stream"
          to: "pudl-deployments"
          topic: "pudl-release"
          content: >
            ${{ needs.create-github-release.result  == 'success' && ':check:' || needs.create-github-release.result == 'failure' && ':x:' || ':warning:' }}
            ${{ github.repository }} release (`${{ github.ref_name }}`)
            finished with status: ${{ needs.create-github-release.result }}.
            [See the logs here](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
