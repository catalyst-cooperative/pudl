---
name: release

on:
  push:
    tags:
      - "v20*"

jobs:
  create-github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Determine previous release tag
        run: |
          echo "PREVIOUS_RELEASE_TAG=$(git tag --list 'v20*' --sort=-v:refname | grep -v "$(git describe --tags --exact-match HEAD 2>/dev/null || echo 'none')" | head -n 1)" >> "${GITHUB_ENV}"
      - name: Create source tarball
        run: |
          mkdir -p dist
          git archive \
            --format=tar.gz \
            --prefix="pudl-${{ github.ref_name }}/" \
            --output="dist/pudl-${{ github.ref_name }}.tar.gz" \
            HEAD
      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          gh release create '${{ github.ref_name }}' \
            --title 'PUDL ${{ github.ref_name }}' \
            --generate-notes \
            --notes-start-tag "$PREVIOUS_RELEASE_TAG" \
            --notes "PUDL is an application that must be installed from the repository using pixi.

          ## Installation:
          \`\`\`bash
          git clone https://github.com/catalyst-cooperative/pudl.git
          cd pudl
          git checkout ${{ github.ref_name }}
          pixi install
          \`\`\`

          ## Data Release:
          Data products generated by this release will be published separately to Zenodo
          as well as s3://pudl.catalyst.coop/'${{ github.ref_name }}'.

          ## Changes:
          See [Release Notes](https://docs.catalyst.coop/pudl/en/latest/release_notes.html) for details." \
              --repo '${{ github.repository }}'
      - name: Attach source tarball to GitHub Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          gh release upload '${{ github.ref_name }}' \
            "dist/pudl-${{ github.ref_name }}.tar.gz" \
            --repo '${{ github.repository }}' \
            --clobber

  notify-slack:
    runs-on: ubuntu-latest
    needs:
      - create-github-release
    steps:
      - name: Inform the Codemonkeys
        uses: slackapi/slack-github-action@v3
        continue-on-error: true
        with:
          method: chat.postMessage
          token: ${{ secrets.PUDL_DEPLOY_SLACK_TOKEN }}
          payload: |
            {
              "text": "${{ needs.create-github-release.result == 'success' && ':check:' || ':x:' }} ${{ github.repository }} release (`${{ github.ref_name }}`) finished with status: ${{ needs.create-github-release.result }}. Logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
              "channel": "C03FHB9N0PQ"
            }
