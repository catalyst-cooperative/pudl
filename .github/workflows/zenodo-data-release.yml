---
name: zenodo-data-release

on:
  workflow_dispatch:
    inputs:
      env:
        description: "Upload to Zenodo server environment:"
        required: true
        options:
          - sandbox
          - production
        default: "sandbox"
        type: choice
      source_dir:
        description: "Path to PUDL data to publish:"
        required: true
        default: "s3://pudl.catalyst.coop/nightly/"
      ignore_regex:
        description: "Ignore files matching this regex:"
        required: false
        default: '^.*\.parquet$'
      publish:
        description: "Automatically publish Zenodo record?"
        required: true
        default: "no-publish"
        options:
          - no-publish
          - publish
        type: choice

jobs:
  zenodo-data-release:
    runs-on: ubuntu-latest
    concurrency:
      group: zenodo-data-release-${{ inputs.env }}
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
    defaults:
      run:
        shell: bash -l {0}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Authenticate to AWS
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: "us-west-2"

      - name: Install pudl environment using pixi
        uses: prefix-dev/setup-pixi@v0.10.0
        with:
          locked: true
          cache: true
          cache-write: ${{ github.event_name == 'push' && github.ref_name == 'main' }}

      - name: Do a Zenodo data release
        env:
          ZENODO_SANDBOX_TOKEN_PUBLISH: ${{ secrets.ZENODO_SANDBOX_TOKEN_PUBLISH }}
          ZENODO_TOKEN_UPLOAD: ${{ secrets.ZENODO_TOKEN_UPLOAD }}
        run: |
          pixi run zenodo_data_release \
            --env "${{ inputs.env }}" \
            --source-dir "${{ inputs.source_dir }}" \
            ${{ inputs.ignore_regex && format('--ignore "{0}"', inputs.ignore_regex) || '' }} \
            --${{ inputs.publish }}

      - name: Notify Zulip of Zenodo data release status
        if: always()
        uses: zulip/github-actions-zulip/send-message@v2
        with:
          api-key: ${{ secrets.ZULIP_API_KEY }}
          email: "build-status-bot@catalyst-cooperative.zulipchat.com"
          organization-url: "https://catalyst-cooperative.zulipchat.com"
          type: "stream"
          to: "pudl-deployments"
          topic: "build-deploy-pudl"
          content: >
            ${{ job.status == 'success' && ':check:' || job.status == 'failure' && ':x:' || ':warning:' }}
            `zenodo-data-release` finished with status `${{ job.status }}` on `${{ github.ref_name }}`
            [See the logs here](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}).
