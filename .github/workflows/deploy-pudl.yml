---
name: deploy-pudl
on:
  push:
    tags:
      # Run the stable deployment pipeline when a tag that looks like a stable tag is pushed
      # This expects that there was successful build associated with the git ref the tag points to
      # It will fail if there was no such build (the same is true of a manually triggered build)
      - "v20*"
  workflow_dispatch:
    inputs:
      git_tag:
        description: "Git tag to merge into nightly/stable branch and trigger Zenodo workflow for"
        required: true
        type: string
      deployment_environment:
        type: choice
        description: "Deploy to staging or production environment?"
        required: true
        default: "staging"
        options:
          - staging
          - production

jobs:
  deploy_pudl:
    permissions:
      contents: write
      id-token: write
    name: Deploy PUDL build from GCS bucket
    runs-on: ubuntu-latest
    env:
      # 'git_tag' and 'deployment_environment' will not be set when triggered by a stable tag push
      GIT_TAG: ${{ inputs.git_tag || github.ref_name }}
      BUILD_ENVIRONMENT: ${{ inputs.deployment_environment || 'production' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Docker Metadata
        id: docker_metadata
        uses: docker/metadata-action@v5
        with:
          images: catalystcoop/pudl-etl
          flavor: |
            latest=auto
          tags: |
            type=raw,value=${{ github.ref_name }}
            type=ref,event=tag

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image and push to Docker Hub
        id: docker_build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: builds/Dockerfile
          push: true
          tags: ${{ steps.docker_metadata.outputs.tags }}
          labels: ${{ steps.docker_metadata.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Determine container image to use
        id: container-image
        run: |
          echo "image=docker.io/catalystcoop/pudl-etl@${{ steps.docker_build.outputs.digest }}" >> "$GITHUB_OUTPUT"
      - id: "auth"
        uses: "google-github-actions/auth@v3"
        with:
          workload_identity_provider: "projects/345950277072/locations/global/workloadIdentityPools/gh-actions-pool/providers/gh-actions-provider"
          service_account: "deploy-pudl-github-action@catalyst-cooperative-pudl.iam.gserviceaccount.com"

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Find matching release tag
        if: github.event_name == 'workflow_run'
        run: |
          git fetch --tags
          SHA="${{ github.event.workflow_run.head_sha }}"
          echo "GIT_TAG=$(git tag --points-at "$SHA") >> $GITHUB_ENV

      - name: Make GCP Batch config file
        run: |-
          ./devtools/generate_batch_config.py \
            --container-image "${{ steps.container-image.outputs.image }}" \
            --container-command "pixi" \
            --container-arg="run" \
            --container-arg="pudl_deploy" \
            --container-arg="${{ env.GIT_TAG }}" \
            --container-arg="--environment" \
            --container-arg="${{ env.BUILD_ENVIRONMENT }}" \
            --container-env GITHUB_TOKEN=${{ secrets.PUDL_BOT_PAT }} \
            --container-env AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} \
            --container-env AWS_DEFAULT_REGION=${{ secrets.AWS_DEFAULT_REGION }} \
            --container-env AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
            --mem-gb=16 \
            --disk-gb=100 \
            --output batch_job.json

      - name: Kick off batch job
        if: ${{ env.SKIP_BUILD != 'true' }}
        run: gcloud batch jobs submit deploy-outputs-${{ github.run_id }}-${{ github.run_attempt }} --config batch_job.json --location us-east1
